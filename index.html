<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .home-center { display:flex; align-items:center; justify-content:center; min-height:60vh; }
        .home-panel { text-align:center; max-width:720px; margin:0 auto; }
        .home-panel h1 { margin-top:0; }
    </style>
</head>
<body>
    <div id="tsparticles"></div>

    <main class="layout-page home-center">
        <section class="panel home-panel">
            <h2>Para quem colore meus dias.</h2>
            <p>Você faz meus dias melhores!</p>
            <a href="menssagem.html" class="btn-link">
                <button type="button">Abrir Menssagem</button>
            </a>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.1/tsparticles.bundle.min.js"></script>
    <script>
        tsParticles.load("tsparticles", {
            fullScreen: { enable: false },
            particles: {
                number: { value: 28, density: { enable: true, area: 800 } },
                color: { value: ["#ff6b6b", "#ff4d6d", "#ff7b9c"] },
                shape: {
                    type: "char",
                    options: {
                        char: {
                            value: ["❤","♥"],
                            font: "Verdana",
                            style: "",
                            weight: "400",
                            fill: true
                        }
                    }
                },
                size: { value: 18, random: { enable: true, minimumValue: 8 } },
                opacity: { value: 0.95 },
                move: { enable: true, speed: 1.1, direction: "top", outModes: { default: "out" } }
            },
            interactivity: {
                events: { onHover: { enable: true, mode: "repulse" }, onClick: { enable: true, mode: "push" } },
                modes: { repulse: { distance: 100 }, push: { quantity: 3 } }
            }
        });
    </script>
</body>
</html>
